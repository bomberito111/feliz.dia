<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día Sofi 💖</title>
    <style>
        :root {
            --color-pink: #ff69b4;
            --color-light-pink: #ffb6d9;
            --color-dark-pink: #ff1493;
            --color-purple: #da70d6;
            --color-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart-container {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        .heart-container:hover {
            transform: scale(1.1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .heart {
            position: relative;
            width: 200px;
            height: 200px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10% { transform: scale(1.1); }
            20% { transform: scale(1); }
        }

        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            top: 0;
            width: 100px;
            height: 160px;
            background: var(--color-pink);
            border-radius: 100px 100px 0 0;
        }

        .heart::before {
            left: 100px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .zoom-sequence {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            z-index: 100;
        }

        .zoom-heart {
            animation: zoomInfinite 3s ease-in-out forwards;
        }

        @keyframes zoomInfinite {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(5); opacity: 0.8; }
            100% { transform: scale(100); opacity: 0; }
        }

        .message-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            z-index: 200;
            padding: 20px;
        }

        .game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            z-index: 300;
            padding: 20px;
        }

        .game-title {
            font-size: 2.5rem;
            color: var(--color-dark-pink);
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .game-content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .game-content .next-button {
            min-width: 150px;
        }

        .next-button {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: var(--color-pink);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .next-button:hover {
            background: var(--color-dark-pink);
            transform: scale(1.1);
        }

        .floating-emoji {
            position: fixed;
            font-size: 50px;
            pointer-events: none;
            animation: floatEmoji 3s ease-out forwards;
            z-index: 400;
        }

        @keyframes floatEmoji {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-300px) rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: repeat(3, 90px);
                grid-template-rows: repeat(3, 90px);
                gap: 10px;
            }
            .emoji-card {
                font-size: 3rem;
            }
            .game-title {
                font-size: 1.8rem;
            }
        }

        .message {
            font-size: 3rem;
            color: var(--color-dark-pink);
            text-align: center;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            animation: fadeInScale 1s ease-out;
            margin-bottom: 30px;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .subtitle {
            font-size: 2rem;
            color: var(--color-purple);
            text-align: center;
            animation: fadeIn 2s ease-out 0.5s both;
            margin-bottom: 40px;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .cat-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            animation: fadeIn 2s ease-out 1s both;
        }

        .cat-gif {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            border: 5px solid var(--color-white);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .cat-gif:hover {
            transform: scale(1.2) rotate(5deg);
        }

        .spinning-cat {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--color-light-pink);
            border-radius: 50%;
            pointer-events: none;
            animation: particle-float 3s ease-out forwards;
        }

        @keyframes particle-float {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-200px) scale(0); }
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .mini-heart {
            position: absolute;
            font-size: 30px;
            animation: floatUp 5s ease-in infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { 
                opacity: 0;
                transform: translateY(100vh) rotate(0deg);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% { 
                opacity: 0;
                transform: translateY(-100px) rotate(360deg);
            }
        }

        .start-text {
            position: absolute;
            bottom: 50px;
            font-size: 1.5rem;
            color: var(--color-white);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .escape-text {
            position: fixed;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--color-white);
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 150;
            animation: fadeOut 1s ease-out forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }

        .catch-me {
            animation: bounce 0.5s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--color-pink);
            position: absolute;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% { 
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% { 
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .hint-box {
            background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,165,0,0.3));
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
            margin: 30px auto;
            max-width: 800px;
            animation: pulse 2s ease-in-out infinite;
        }

        .hint-title {
            font-size: 2.5rem;
            color: #ffd700;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,215,0,1), 0 0 30px rgba(255,215,0,0.8);
        }

        .hint-text {
            font-size: 2rem;
            color: #ffffff;
            text-align: center;
            line-height: 1.6;
            margin: 15px 0;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
        }

        .hint-detail {
            font-size: 1.6rem;
            color: #ffeb3b;
            text-align: center;
            line-height: 1.5;
            margin-top: 20px;
        }

        .slideshow-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            height: 500px;
            margin: 0 auto;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slideshow-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
            animation: fadeIn 0.5s ease;
        }

        .slideshow-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            background: rgba(255,255,255,0.3);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .slideshow-button:hover {
            background: rgba(255,255,255,0.5);
            transform: translateY(-50%) scale(1.1);
        }

        .slideshow-button.prev {
            left: 20px;
        }

        .slideshow-button.next {
            right: 20px;
        }

        .photo-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .message {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 1.3rem;
            }
            .cat-gif {
                width: 100px;
                height: 100px;
            }
            .game-title {
                font-size: 1.6rem;
            }
            .next-button {
                font-size: 1.2rem;
                padding: 12px 30px;
            }
            .start-text {
                font-size: 1.2rem;
                bottom: 30px;
            }
            .hint-title {
                font-size: 1.8rem;
            }
            .hint-text {
                font-size: 1.4rem;
            }
            .hint-detail {
                font-size: 1.2rem;
            }
            .slideshow-container {
                height: 350px;
            }
            .slideshow-button {
                font-size: 2rem;
                width: 50px;
                height: 50px;
            }
        }

        @media (max-width: 414px) and (max-height: 896px) {
            .message {
                font-size: 1.6rem;
                margin-bottom: 20px;
            }
            .subtitle {
                font-size: 1.2rem;
                margin-bottom: 30px;
            }
            .next-button {
                font-size: 1.3rem;
                padding: 12px 30px;
            }
            .escape-text {
                font-size: 2rem;
            }
            .hint-title {
                font-size: 1.5rem;
            }
            .hint-text {
                font-size: 1.2rem;
            }
            .hint-detail {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-hearts" id="floatingHearts"></div>

    <div class="container" id="mainContainer">
        <div class="heart-container" id="heartContainer">
            <div class="heart"></div>
        </div>
        <div class="start-text">👆 ¡Intenta atrapar el corazón! 💕</div>
    </div>

    <div class="zoom-sequence" id="zoomSequence">
        <div class="heart zoom-heart"></div>
    </div>

    <div class="message-container" id="messageContainer">
        <div class="message">
            ¡FELIZ DÍA A LA MUJER MÁS BELLA!<br>
            💖 FELIZ DÍA SOFIIIII 💖
        </div>
        <div class="subtitle">
            ¡Eres increíble! 🌟✨
        </div>
        <button class="next-button" id="playGameBtn">🎮 ¡Comenzar Aventura! 🎮</button>
        <div class="cat-container">
            <img class="cat-gif" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif" alt="Gatito feliz">
            <img class="cat-gif spinning-cat" src="https://media.tenor.com/EFDwfjT2GuQAAAAM/spinning-cat.gif" alt="Gatito girando">
            <img class="cat-gif" src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" alt="Gatito bailando">
            <img class="cat-gif" id="secretBtn" src="https://media.tenor.com/exRZ3es-yb8AAAAM/maxwell-maxwell-cat.gif" alt="Maxwell Cat" style="cursor: pointer; transition: all 0.3s ease;">
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="game-title" id="gameTitle">🎮 ¿Preparada para el RETO FINAL? 🎮</div>
        <div class="game-content" id="gameContent">
            <button class="next-button" id="siBtn">✅ SÍ</button>
            <button class="next-button" id="noBtn">❌ NO</button>
        </div>
        <button class="next-button" id="backToMessageBtn">💖 Volver al Mensaje</button>
    </div>

    <script>
        const heartContainer = document.getElementById('heartContainer');
        const mainContainer = document.getElementById('mainContainer');
        const zoomSequence = document.getElementById('zoomSequence');
        const messageContainer = document.getElementById('messageContainer');
        const floatingHearts = document.getElementById('floatingHearts');

        let escapeCount = 0;
        let lastEscapeTime = 0;
        const escapeMessages = [
            '¡EPAAAAA! 😜',
            '¡NO ME AGARRAS! 😝',
            '¡JAJA CASI! 🤪',
            '¡MUY LENTA! 😆',
            '¡INTÉNTALO DE NUEVO! 😏',
            '¡QUE RÁPIDA! 🏃‍♀️',
            '¡CATCH ME IF YOU CAN! 💨',
            '¡UYYYY! 😱',
            '¡POR POCO! 😅',
            '¡SIGUE INTENTANDO! 💪'
        ];

        function createFloatingHearts() {
            const hearts = ['💖', '💕', '💗', '💓', '💝', '❤️'];
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'mini-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                floatingHearts.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 5000);
            }, 300);
        }

        function createParticles(x, y) {
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = `hsl(${Math.random() * 60 + 300}, 100%, 70%)`;
                
                const angle = (Math.PI * 2 * i) / 15;
                const velocity = 100;
                particle.style.setProperty('--tx', Math.cos(angle) * velocity + 'px');
                particle.style.setProperty('--ty', Math.sin(angle) * velocity + 'px');
                
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 3000);
            }
        }

        function createConfetti() {
            const colors = ['#ff69b4', '#da70d6', '#ffd700', '#00ff00', '#00bfff', '#ff6347'];
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 2 + 's';
                    confetti.style.width = (Math.random() * 10 + 5) + 'px';
                    confetti.style.height = (Math.random() * 10 + 5) + 'px';
                    messageContainer.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        function showEscapeText(x, y, message) {
            const escapeText = document.createElement('div');
            escapeText.className = 'escape-text';
            escapeText.textContent = message;
            escapeText.style.left = x + 'px';
            escapeText.style.top = y + 'px';
            document.body.appendChild(escapeText);
            setTimeout(() => escapeText.remove(), 1000);
        }

        function escapeHeart() {
            const now = Date.now();
            if (now - lastEscapeTime < 500) return;
            lastEscapeTime = now;

            escapeCount++;
            const maxX = window.innerWidth - 250;
            const maxY = window.innerHeight - 250;
            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;

            heartContainer.classList.add('catch-me');
            setTimeout(() => heartContainer.classList.remove('catch-me'), 500);

            heartContainer.style.transition = 'all 0.3s ease-out';
            heartContainer.style.left = newX + 'px';
            heartContainer.style.top = newY + 'px';

            const message = escapeMessages[Math.floor(Math.random() * escapeMessages.length)];
            showEscapeText(newX + 100, newY + 100, message);

            createParticles(newX + 100, newY + 100);
        }

        heartContainer.addEventListener('mouseenter', () => {
            if (escapeCount < 8) {
                escapeHeart();
            }
        });

        heartContainer.addEventListener('click', (e) => {
            if (escapeCount < 8) {
                escapeCount++;
                heartContainer.classList.add('shake');
                setTimeout(() => heartContainer.classList.remove('shake'), 500);
                escapeHeart();
                return;
            }

            createParticles(e.clientX, e.clientY);
            
            mainContainer.style.display = 'none';
            zoomSequence.style.display = 'flex';

            setTimeout(() => {
                zoomSequence.style.display = 'none';
                messageContainer.style.display = 'flex';
                createConfetti();
                
                setTimeout(() => {
                    createConfetti();
                }, 2000);
            }, 3000);
        });

        const catGifs = document.querySelectorAll('.cat-gif:not(#secretBtn)');
        const catSounds = ['¡MIAU! 🐱', '¡PURR! 😻', '¡MEOW! 🐈', '¡MRRR! 😺'];
        
        catGifs.forEach(cat => {
            let catClicks = 0;
            
            cat.addEventListener('click', function(e) {
                catClicks++;
                createParticles(e.clientX, e.clientY);
                
                const sound = catSounds[Math.floor(Math.random() * catSounds.length)];
                showEscapeText(e.clientX, e.clientY, sound);
                
                if (catClicks % 3 === 0) {
                    this.style.transform = 'scale(2) rotate(720deg)';
                    createConfetti();
                } else {
                    this.style.transform = 'scale(1.5) rotate(360deg)';
                }
                
                setTimeout(() => {
                    this.style.transform = '';
                }, 500);
            });

            cat.addEventListener('mouseenter', function() {
                this.style.filter = 'brightness(1.2) saturate(1.5)';
            });

            cat.addEventListener('mouseleave', function() {
                this.style.filter = '';
            });
        });

        createFloatingHearts();

        const playGameBtn = document.getElementById('playGameBtn');
        const secretBtn = document.getElementById('secretBtn');
        const gameContainer = document.getElementById('gameContainer');

        secretBtn.addEventListener('click', () => {
            speak('¡Encontraste el secreto! Ahora viene el desafío final');
            messageContainer.style.display = 'none';
            
            const secretContainer = document.createElement('div');
            secretContainer.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(135deg, #1e3a8a 0%, #7c2d12 100%);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 500;
                padding: 20px;
            `;
            
            secretContainer.innerHTML = `
                <div style="text-align: center; max-width: 600px;">
                    <h1 style="font-size: 3rem; color: #fbbf24; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); animation: fadeInScale 1s ease;">
                        🔐 ¡ENCONTRASTE EL SECRETO! 🔐
                    </h1>
                    <p style="font-size: 1.5rem; color: white; margin-bottom: 20px;">
                        Resuelve este acertijo para desbloquear el mensaje final:
                    </p>
                    <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; margin: 20px 0;">
                        <p style="font-size: 1.8rem; color: #fbbf24; font-weight: bold; line-height: 1.6;">
                            ¿Cuál es la contraseña secreta? 🔐<br><br>
                            <span style="font-size: 1.4rem; color: white;">
                            Pista: Es el apodo que le inventé a Sofi<br>
                            + "klein" (todo junto, sin espacios)
                            </span>
                        </p>
                    </div>
                    <input type="text" id="riddleAnswer" placeholder="Tu respuesta..." style="width: 300px; padding: 15px; font-size: 1.5rem; border-radius: 10px; border: none; text-align: center; margin: 20px 0;">
                    <br>
                    <button class="next-button" id="checkAnswer" style="margin: 10px;">✅ Verificar</button>
                    <button class="next-button" id="closeSecret" style="background: #dc2626;">❌ Cerrar</button>
                    <p id="riddleHint" style="font-size: 1rem; color: #fbbf24; margin-top: 20px; min-height: 30px;"></p>
                </div>
            `;
            
            document.body.appendChild(secretContainer);
            
            const riddleAnswer = document.getElementById('riddleAnswer');
            const checkAnswer = document.getElementById('checkAnswer');
            const closeSecret = document.getElementById('closeSecret');
            const riddleHint = document.getElementById('riddleHint');
            
            let attempts = 0;
            const correctAnswer = 'sofiklein';
            
            checkAnswer.addEventListener('click', () => {
                const userAnswer = riddleAnswer.value.toLowerCase().trim();
                attempts++;
                
                if (userAnswer === correctAnswer) {
                    speak('¡Correcto! Eres increíble Sofi');
                    riddleHint.textContent = '🎉 ¡CORRECTO! 🎉';
                    riddleHint.style.color = '#10b981';
                    
                    setTimeout(() => {
                        secretContainer.innerHTML = `
                            <div style="text-align: center; max-width: 800px; animation: fadeInScale 1s ease;">
                                <h1 style="font-size: 3.5rem; color: #fbbf24; margin-bottom: 30px;">
                                    💖 MENSAJE FINAL 💖
                                </h1>
                                <div style="background: rgba(255,255,255,0.15); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px);">
                                    <p style="font-size: 2rem; color: white; line-height: 1.8; margin-bottom: 30px;">
                                        <strong style="color: #fbbf24;">Sofi,</strong><br><br>
                                        Este día especial es para celebrarte a ti.<br>
                                        Eres una persona increíble, talentosa y especial.<br>
                                        Cada momento contigo es un regalo.<br><br>
                                        Gracias por ser quien eres.<br>
                                        Gracias por tu sonrisa, tu alegría y tu luz.<br><br>
                                        <strong style="color: #fbbf24;">¡FELIZ DÍA DE LA MUJER!</strong><br>
                                        💖✨🌟💕🎊
                                    </p>
                                    <img src="https://media.tenor.com/EFDwfjT2GuQAAAAM/spinning-cat.gif" style="width: 150px; height: 150px; border-radius: 50%; margin: 20px 0;">
                                </div>
                                <button class="next-button" onclick="location.reload()" style="margin-top: 30px;">🏠 Volver al Inicio</button>
                            </div>
                        `;
                        createConfetti();
                        setTimeout(() => createConfetti(), 1000);
                        setTimeout(() => createConfetti(), 2000);
                    }, 1500);
                } else {
                    speak('Intenta de nuevo');
                    if (attempts === 1) {
                        riddleHint.textContent = '💡 Pista: El apodo empieza con "sofi"...';
                    } else if (attempts === 2) {
                        riddleHint.textContent = '💡 Pista: "sofi" + "klein" todo junto';
                    } else {
                        riddleHint.textContent = '💡 Pista: sofiklein (sin espacios ni mayúsculas)';
                    }
                    riddleAnswer.value = '';
                    riddleAnswer.style.border = '3px solid #dc2626';
                    setTimeout(() => {
                        riddleAnswer.style.border = 'none';
                    }, 500);
                }
            });
            
            closeSecret.addEventListener('click', () => {
                secretContainer.remove();
                messageContainer.style.display = 'flex';
            });
            
            riddleAnswer.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    checkAnswer.click();
                }
            });
        });
        const gameContent = document.getElementById('gameContent');
        const gameTitle = document.getElementById('gameTitle');
        const backToMessageBtn = document.getElementById('backToMessageBtn');
        const siBtn = document.getElementById('siBtn');
        const noBtn = document.getElementById('noBtn');

        let noEscapeCount = 0;
        const noMessages = [
            '¿Segura que NO? 🤔',
            'Venga... di que SÍ 😏',
            '¡No seas malita! 😜',
            'Dale al SÍ pues 🥺',
            '¡VENGA YA! 😤',
            'El botón NO está roto 😝',
            '¡Por favoooor! 🙏',
            'Ya cansaste... di SÍ 😂',
            'OK OK... pero di SÍ 💕',
            '¡ÚLTIMA OPORTUNIDAD! ⚠️'
        ];

        function speak(text) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-ES';
                utterance.rate = 1.2;
                utterance.pitch = 1.1;
                speechSynthesis.speak(utterance);
            }
        }

        function playMeow() {
            const meowSounds = ['Miau', 'Miaaau', 'Mrrr', 'Meow'];
            const randomMeow = meowSounds[Math.floor(Math.random() * meowSounds.length)];
            speak(randomMeow);
        }

        playGameBtn.addEventListener('click', () => {
            messageContainer.style.display = 'none';
            gameContainer.style.display = 'flex';
            speak('¿Preparada para el reto final?');
        });

        let siEscapeCount = 0;
        let siAnimating = false;

        siBtn.addEventListener('mouseenter', () => {
            if (!siAnimating && Math.random() > 0.5) {
                siEscapeCount++;
                const maxX = window.innerWidth - 200;
                const maxY = window.innerHeight - 200;
                const newX = Math.random() * maxX;
                const newY = Math.random() * maxY;

                siBtn.style.position = 'fixed';
                siBtn.style.transition = 'all 0.3s ease';
                siBtn.style.left = newX + 'px';
                siBtn.style.top = newY + 'px';
                
                speak('¡Jaja te escapé!');
                showEscapeText(newX, newY, '¡TROLEADA! 😂');
            }
        });

        let siClickCount = 0;
        let buttonsSwapped = false;

        siBtn.addEventListener('click', () => {
            if (siAnimating) return;
            
            if (siClickCount === 0) {
                siClickCount++;
                buttonsSwapped = true;
                
                const siPosition = siBtn.getBoundingClientRect();
                const noPosition = noBtn.getBoundingClientRect();
                
                siBtn.style.position = 'fixed';
                siBtn.style.left = siPosition.left + 'px';
                siBtn.style.top = siPosition.top + 'px';
                
                noBtn.style.position = 'fixed';
                noBtn.style.left = noPosition.left + 'px';
                noBtn.style.top = noPosition.top + 'px';
                
                setTimeout(() => {
                    siBtn.style.transition = 'all 0.5s ease';
                    noBtn.style.transition = 'all 0.5s ease';
                    
                    siBtn.style.left = noPosition.left + 'px';
                    siBtn.style.top = noPosition.top + 'px';
                    
                    noBtn.style.left = siPosition.left + 'px';
                    noBtn.style.top = siPosition.top + 'px';
                }, 10);
                
                speak('¡Jaja! ¡Dijiste que NO! Los botones se cambiaron de lugar');
                showEscapeText(window.innerWidth / 2, window.innerHeight / 2, '¡CAMBIARON DE LUGAR! 😂');
                
                setTimeout(() => {
                    siBtn.style.transition = '';
                    noBtn.style.transition = '';
                }, 600);
                
                return;
            }
            
            siAnimating = true;

            speak('¡Vamos allá! Momento especial iniciando');
            
            siBtn.style.transition = 'all 0.5s ease';
            siBtn.style.transform = 'scale(2) rotate(720deg)';
            
            setTimeout(() => {
                siBtn.innerHTML = '<img src="https://media.tenor.com/exRZ3es-yb8AAAAM/maxwell-maxwell-cat.gif" style="width: 100px; height: 100px; border-radius: 50%;">';
                speak('¡Maxwell Cat apareció!');
            }, 500);

            setTimeout(() => {
                gameTitle.textContent = '🎉 ¡GALERÍA DE RECUERDOS! 🎉';
                speak('Aquí están nuestros mejores momentos juntos');
                
                const photos = [
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/05d85010-a855-499a-9a0c-8d9fd6f52058',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/e883cdf9-4740-4378-aca2-1996acd502ec',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/1ed65741-0891-4be1-bd8c-2380fe64378f',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/96f2464b-5d78-4f35-8c32-44b1a2606a8f',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/d4fac58a-7023-4887-9704-f3a4029070e1',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/188f10d4-0658-4cc7-8847-043cd3c64b53',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/6450ad7c-335e-438e-9a60-7da57aef2b69',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/c44971ff-71f8-439c-b146-e668480cff34',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/4fbf8e7e-a3e0-4333-bace-6dd72092fb3a',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/ad8013ee-52d2-415c-8678-a458b9c21f17',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/647e9a25-ccaa-4456-94ca-982959eb5a2a',
                    'https://agi-prod-file-upload-public-main-use1.s3.amazonaws.com/49a91883-85b0-4b65-9825-a0c0d933c2ed'
                ];
                
                let currentPhotoIndex = 0;
                
                gameContent.innerHTML = `
                    <div style="width: 100%; max-width: 900px; text-align: center;">
                        <div class="slideshow-container">
                            <img id="currentPhoto" src="${photos[0]}" class="slideshow-image">
                            <button id="prevPhoto" class="slideshow-button prev">◀</button>
                            <button id="nextPhoto" class="slideshow-button next">▶</button>
                            <div class="photo-counter">
                                <span id="photoCounter">1 / ${photos.length}</span>
                            </div>
                        </div>
                        
                        <p style="font-size: 2rem; color: var(--color-dark-pink); font-weight: bold; margin: 30px 0; text-align: center;">
                            💕 Cada momento contigo es especial 💕
                        </p>
                        
                        <div class="hint-box">
                            <div class="hint-title">
                                🔐✨ ¡HAY UN BOTÓN OCULTO! ✨🔐
                            </div>
                            <div class="hint-text">
                                🐱 ¡EN EL ÚLTIMO GATITO! 🐱<br>
                                👉 ¡A LA DERECHAAAA! 👈
                            </div>
                            <div class="hint-detail">
                                Vuelve a la página principal y busca a <strong>Maxwell Cat</strong> 😼<br>
                                ¡Es el <strong>CUARTO GATO</strong>, el de la <strong>DERECHA</strong>! 🎯<br>
                                Haz click en él para desbloquear el mensaje final 💖<br>
                                👀🔐✨
                            </div>
                        </div>
                        
                        <button class="next-button" onclick="location.reload()" style="margin-top: 30px;">🔙 Volver al Inicio</button>
                    </div>
                `;
                
                const currentPhoto = document.getElementById('currentPhoto');
                const photoCounter = document.getElementById('photoCounter');
                const prevPhoto = document.getElementById('prevPhoto');
                const nextPhoto = document.getElementById('nextPhoto');
                
                function updatePhoto() {
                    currentPhoto.style.animation = 'none';
                    setTimeout(() => {
                        currentPhoto.src = photos[currentPhotoIndex];
                        currentPhoto.style.animation = 'fadeIn 0.5s ease';
                        photoCounter.textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
                    }, 50);
                }
                
                prevPhoto.addEventListener('click', () => {
                    speechSynthesis.cancel();
                    currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
                    updatePhoto();
                    playMeow();
                });
                
                nextPhoto.addEventListener('click', () => {
                    speechSynthesis.cancel();
                    currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
                    updatePhoto();
                    playMeow();
                });
                
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') {
                        speechSynthesis.cancel();
                        prevPhoto.click();
                    }
                    if (e.key === 'ArrowRight') {
                        speechSynthesis.cancel();
                        nextPhoto.click();
                    }
                });
                
                setTimeout(() => {
                    speak('¡Hay un botón secreto oculto! Busca el último gatito a la derechaaaa, es Maxwell Cat');
                }, 2000);
                
                createConfetti();
                setTimeout(() => createConfetti(), 1500);
                setTimeout(() => createConfetti(), 3000);
            }, 1000);
        });

        noBtn.addEventListener('click', (e) => {
            if (siClickCount === 1 && buttonsSwapped) {
                siClickCount++;
                buttonsSwapped = false;
                
                const siPosition = siBtn.getBoundingClientRect();
                const noPosition = noBtn.getBoundingClientRect();
                
                siBtn.style.transition = 'all 0.5s ease';
                noBtn.style.transition = 'all 0.5s ease';
                
                siBtn.style.left = noPosition.left + 'px';
                siBtn.style.top = noPosition.top + 'px';
                
                noBtn.style.left = siPosition.left + 'px';
                noBtn.style.top = siPosition.top + 'px';
                
                speak('¡Bien! Ahora volvieron a su lugar normal');
                showEscapeText(window.innerWidth / 2, window.innerHeight / 2, '¡DE VUELTA! 🔄');
                
                setTimeout(() => {
                    siBtn.style.position = 'relative';
                    siBtn.style.left = 'auto';
                    siBtn.style.top = 'auto';
                    siBtn.style.transition = '';
                    
                    noBtn.style.position = 'relative';
                    noBtn.style.left = 'auto';
                    noBtn.style.top = 'auto';
                    noBtn.style.transition = '';
                }, 600);
                
                return;
            }
            
            noEscapeCount++;
            
            const maxX = window.innerWidth - 200;
            const maxY = window.innerHeight - 200;
            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;

            noBtn.style.position = 'fixed';
            noBtn.style.transition = 'all 0.3s ease';
            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';

            if (noEscapeCount < noMessages.length) {
                const message = noMessages[noEscapeCount - 1];
                gameTitle.textContent = message;
                speak(message);
                showEscapeText(newX + 100, newY + 50, '¡EPAAAA! 😝');
            } else {
                gameTitle.textContent = '😤 OK, no hay opción de NO...';
                speak('OK, no hay opción de decir que no');
                noBtn.style.display = 'none';
                siBtn.textContent = '✅ LA ÚNICA OPCIÓN';
                siBtn.style.transform = 'scale(1.5)';
                siBtn.style.animation = 'pulse 1s ease-in-out infinite';
            }

            createParticles(e.clientX, e.clientY);
            playMeow();
        });

        siBtn.addEventListener('mouseenter', () => {
            speak('Dale click aquí');
        });

        noBtn.addEventListener('mouseenter', () => {
            if (noEscapeCount < 3) {
                speak('No me hagas escapar');
            }
        });

        backToMessageBtn.addEventListener('click', () => {
            gameContainer.style.display = 'none';
            messageContainer.style.display = 'flex';
            noEscapeCount = 0;
            noBtn.style.position = 'relative';
            noBtn.style.left = 'auto';
            noBtn.style.top = 'auto';
            noBtn.style.display = 'inline-block';
            siBtn.textContent = '✅ SÍ';
            siBtn.style.transform = 'scale(1)';
            siBtn.style.animation = 'none';
            gameTitle.textContent = '🎮 ¿Preparada para el RETO FINAL? 🎮';
            gameContent.innerHTML = `
                <button class="next-button" id="siBtn">✅ SÍ</button>
                <button class="next-button" id="noBtn">❌ NO</button>
            `;
            location.reload();
        });
    </script>
</body>
</html>
