/* ════════════════════════════════════════════════════════════════
   SCIENTIFIC TEXT  — regex-based formula renderer
════════════════════════════════════════════════════════════════ */
const Sci = ({ t = "", cls = "" }) => {
  if (!t) return null;
  const parts = [];
  let i = 0, buf = "";
  while (i < t.length) {
    // digits after letter/closing bracket → subscript, unless followed by + or -
    if (/\d/.test(t[i]) && i > 0 && /[A-Za-z)\]]/.test(t[i - 1])) {
      let d = "";
      while (i < t.length && /\d/.test(t[i])) { d += t[i++]; }
      if (i < t.length && /[+-]/.test(t[i])) {
        const s = t[i++];
        if (buf) { parts.push(<span key={parts.length}>{buf}</span>); buf = ""; }
        parts.push(<sup key={parts.length}>{d}{s}</sup>);
      } else {
        if (buf) { parts.push(<span key={parts.length}>{buf}</span>); buf = ""; }
        parts.push(<sub key={parts.length}>{d}</sub>);
      }
      continue;
    }
    // lone charge after letter/digit
    if (/[+-]/.test(t[i]) && i > 0 && /[A-Za-z\d]/.test(t[i - 1])) {
      const s = t[i++];
      if (buf) { parts.push(<span key={parts.length}>{buf}</span>); buf = ""; }
      parts.push(<sup key={parts.length}>{s}</sup>);
      continue;
    }
    buf += t[i++];
  }
  if (buf) parts.push(<span key={parts.length}>{buf}</span>);
  return <span className={cls} style={{ fontFamily: "'Georgia',serif" }}>{parts}</span>;
};

/* ════════════════════════════════════════════════════════════════
   AUDIO ENGINE — Web Audio API spatial effects
════════════════════════════════════════════════════════════════ */
let _ac = null;
const getAC = () => {
  if (!_ac) {
    try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (_ac && _ac.state === 'suspended') _ac.resume().catch(()=>{});
  return _ac;
};

const playTone = (freq, dur, vol=0.3, type='sine', delay=0) => {
  const ac = getAC(); if(!ac) return;
  try {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = ac.currentTime + delay;
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.linearRampToValueAtTime(vol, t+0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
    osc.start(t); osc.stop(t+dur+0.05);
  } catch(e){}
};

const playNoise = (dur, vol=0.3, freq=600, q=5) => {
  const ac = getAC(); if(!ac) return;
  try {
    const bufSize = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/bufSize,0.4);
    const src = ac.createBufferSource(); src.buffer = buf;
    const filt = ac.createBiquadFilter(); filt.type='bandpass';
    filt.frequency.value=freq; filt.Q.value=q;
    const gain = ac.createGain(); gain.gain.value=vol;
    src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
    src.start();
  } catch(e){}
};

/* ════════════════════════════════════════════════════════════════
   SPEAK — ResponsiveVoice (funciona en TODOS los navegadores)
   Dug  → Spanish Female, tono agudo y alegre
   Michi → Spanish Male,  tono grave y lento
════════════════════════════════════════════════════════════════ */
const speak = (text, isMichi = false) => {
  // Play character sound stinger first
  if (isMichi) michiLaugh(); else dugBark();

  const delay = isMichi ? 280 : 130;
  setTimeout(() => {
    // Cancel any ongoing speech
    if (window.responsiveVoice) {
      window.responsiveVoice.cancel();
      if (isMichi) {
        // 😼 Michimalvado — grave, lento, amenazante
        window.responsiveVoice.speak(text, "Spanish Male", {
          pitch: 0.1,   // muy grave
          rate:  0.72,  // lento y dramático
          volume: 1.0,
        });
      } else {
        // 🐕 Dug — agudo, rápido, entusiasta
        window.responsiveVoice.speak(text, "Spanish Female", {
          pitch: 1.8,   // muy agudo y alegre
          rate:  1.2,   // rápido y emocionado
          volume: 0.95,
        });
      }
    } else if (window.speechSynthesis) {
      // Fallback: Web Speech API nativo
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "es-ES";
      u.rate   = isMichi ? 0.72 : 1.25;
      u.pitch  = isMichi ? 0.1  : 1.8;
      u.volume = isMichi ? 1.0  : 0.95;
      window.speechSynthesis.speak(u);
    }
  }, delay);
};

/* ════════════════════════════════════════════════════════════════
   SPEECH BUBBLE with typewriter
════════════════════════════════════════════════════════════════ */
const Bubble = ({ text, side="left", onDone, auto=false, speaker="", color="#fef9c3", border="#ca8a04" }) => {
  const [disp, setDisp] = useState(""); const [done, setDone] = useState(false);
  const idx = useRef(0); const iRef = useRef(null);
  const isMichiVoice = speaker.toUpperCase().includes("MICHI");
  useEffect(()=>{
    setDisp(""); setDone(false); idx.current=0;
    // Auto-speak when bubble appears
    speak(text, isMichiVoice);
    iRef.current = setInterval(()=>{
      if(idx.current < text.length){ setDisp(text.slice(0,++idx.current)); }
      else { setDone(true); clearInterval(iRef.current); if(auto) setTimeout(()=>onDone&&onDone(),1100); }
    },22);
    return ()=>{ clearInterval(iRef.current); };
  },[text]);
  const skip = ()=>{ if(!done){setDisp(text);setDone(true);clearInterval(iRef.current);} else onDone&&onDone(); };
  const tailClass = side==="left"?"tail-l":"tail-r";
  return (
    <div onClick={skip} className={`relative cursor-pointer pop-in rounded-2xl p-4 max-w-xs ${tailClass}`}
      style={{background:color,border:`3px solid ${border}`,boxShadow:`4px 4px 0 ${border}`,borderColor:border}}>
      {speaker && <div className="text-xs font-bold mb-1 bangers" style={{color:border}}>{speaker}</div>}
      <p className="text-gray-900 text-sm leading-relaxed" style={{fontFamily:"Nunito,sans-serif"}}>{disp}
        <span style={{borderRight:`2px solid #555`,animation:done?"none":"blink .7s step-end infinite"}} className={done?"hidden":""}></span>
      </p>
      {done && <p className="text-right text-xs mt-1 bangers" style={{color:border}}>{auto?"...":"TAP para continuar ▶"}</p>}
    </div>
  );
};

const MultiChallenge = ({ ch, onResult }) => {
  const [sel, setSel] = useState(null); const [locked, setLocked] = useState(false);
  const choose = i => {
    if (locked) return;
    setSel(i); setLocked(true);
    setTimeout(()=>onResult(ch.options[i].ok, ch.options[i].fb), 800);
  };
  return (
    <div className="w-full max-w-md space-y-3">
      {ch.options.map((o,i)=>{
        let cls="btn-option";
        if(locked && i===sel) cls+=o.ok?" correct":" wrong";
        if(locked && o.ok && i!==sel) cls+=" correct";
        return (
          <button key={i} onClick={()=>choose(i)} disabled={locked}
            className={`${cls} w-full px-4 py-3.5 rounded-xl text-left font-bold text-white text-sm`}>
            <Sci t={o.t}/>
          </button>
        );
      })}
    </div>
  );
};

const ClassifyChallenge = ({ ch, onResult }) => {
  const [places, setPlaces] = useState({}); const [sel, setSel] = useState(null); const [checked, setChecked] = useState(false);
  const unplaced = ch.items.filter(it=>!places[it.t]);
  const place = cat=>{ if(!sel||checked) return; setPlaces(p=>({...p,[sel]:cat})); setSel(null); };
  const remove = t=>{ if(checked) return; setPlaces(p=>{const n={...p}; delete n[t]; return n;}); };
  const check = ()=>{
    setChecked(true);
    const ok = ch.items.every(it=>places[it.t]===it.ans);
    setTimeout(()=>onResult(ok, ok?"¡Clasificación perfecta!":"¡Algún ion está mal ubicado!"), 1200);
  };
  return (
    <div className="w-full max-w-md space-y-3">

        <button onClick={check} className="btn-go w-full py-3.5 rounded-xl bangers text-xl text-white">
          🔓 ¡VERIFICAR!
        </button>
      )}
      {!checked && unplaced.length>0 && <p className="text-center text-slate-400 text-xs">Toca un ion → toca la categoría. Toca uno ubicado para devolverlo.</p>}
    </div>
  );
};

const RedoxChallenge = ({ ch, onResult }) => {
  const [asn, setAsn] = useState({}); const [selItem, setSelItem] = useState(null); const [checked, setChecked] = useState(false);
  const assign = role=>{ if(!selItem||checked) return; setAsn(p=>({...p,[selItem]:role})); setSelItem(null); };
  const check = ()=>{
    setChecked(true);
    const ok = ch.items.every(it=>asn[it.t]===it.role);
    setTimeout(()=>onResult(ok, ok?"¡Agentes perfectamente identificados!":"¡Confundiste oxidante y reductor! OIL RIG!"), 1200);
  };
  return (
    <div className="w-full max-w-md space-y-4">
      <div className="flex gap-3 justify-center">
        {ch.items.map(it=>(
          <button key={it.t} onClick={()=>!checked&&setSelItem(it.t)}
            className={`px-6 py-4 rounded-xl font-black text-xl border-2 transition-all
              ${selItem===it.t?"border-yellow-400 bg-yellow-400/30 text-yellow-200 scale-110":"border-slate-500 bg-slate-700 text-white hover:border-cyan-400"}`}>
            <Sci t={it.t}/>
          </button>
        ))}
      </div>
      <div className="grid grid-cols-2 gap-3">
        {ch.roles.map(role=>(
          <div key={role} onClick={()=>assign(role)}
            className={`min-h-24 p-4 rounded-xl border-2 cursor-pointer transition-all flex flex-col items-center justify-center gap-2
              ${selItem?"border-yellow-400 bg-yellow-400/10 hover:bg-yellow-400/20":"border-slate-600 bg-slate-800/50"}`}>
            <p className="bangers text-sm text-center" style={{color:role==="oxidante"?"#f87171":"#60a5fa"}}>{ch.roleLabels[role]}</p>
            {Object.entries(asn).filter(([,r])=>r===role).map(([t])=>{
              const item=ch.items.find(i=>i.t===t);
              const ok=checked&&item.role===role; const wrong=checked&&item.role!==role;
              return (
                <div key={t} className={`item-chip text-white border-2 ${ok?"border-green-400 bg-green-500/30":wrong?"border-red-400 bg-red-500/30":"border-violet-400 bg-violet-500/20"}`}>
                  <Sci t={t}/>
                </div>
              );
            })}
          </div>
        ))}
      </div>
      {!checked && Object.keys(asn).length===ch.items.length && (
        <button onClick={check} className="btn-go w-full py-3.5 rounded-xl bangers text-xl text-white">⚡ ¡CONFIRMAR!</button>
      )}
      {!checked && Object.keys(asn).length<ch.items.length && <p className="text-center text-slate-400 text-xs">Selecciona un elemento, luego su rol.</p>}
    </div>
  );
};

const NumericChallenge = ({ ch, onResult }) => {
  const [val, setVal] = useState(""); const [hint, setHint] = useState(false); const [locked, setLocked] = useState(false); const [state, setState] = useState("");
  const submit = ()=>{
    if(locked) return;
    const n=parseFloat(val);
    const ok=!isNaN(n)&&Math.abs(n-ch.answer)<=ch.tolerance;
    setState(ok?"correct":"wrong"); setLocked(true);
    setTimeout(()=>onResult(ok, ok?`¡${ch.answer} ${ch.unit}! ¡PERFECTO!`:`Era ${ch.answer} ${ch.unit}. Usa M₁V₁=M₂V₂`), 700);
  };
  return (
    <div className="w-full max-w-xs space-y-4">
      <div className="flex items-center gap-3 justify-center flex-wrap">
        <span className="text-slate-300 text-sm">M(NaOH) =</span>
        <input type="number" step="0.001" value={val} onChange={e=>!locked&&setVal(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&submit()}
          className={`sci-input ${state}`} placeholder="0.000"/>
        <span className="text-slate-300 text-sm">{ch.unit}</span>
      </div>
      <button onClick={submit} disabled={!val||locked}
        className="btn-go w-full py-3 rounded-xl bangers text-xl text-white disabled:opacity-50">
        🔢 CALCULAR Y CONFIRMAR
      </button>
      <button onClick={()=>setHint(h=>!h)}
        className="w-full py-2 rounded-xl text-yellow-400 border border-yellow-800 bg-yellow-900/20 hover:bg-yellow-900/40 text-sm">
        {hint?"▼ Ocultar pista":"▶ Pista de Dug (solo si de verdad la necesitas)"}
      </button>
      {hint && <div className="p-3 rounded-xl border border-yellow-700 bg-yellow-900/20">
        <p className="text-yellow-200 text-sm whitespace-pre-line">🐕 {ch.hint}</p>
      </div>}
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════════════════════════ */
function App() {
  useEffect(()=>{
    const el=document.createElement("style"); el.textContent=CSS;
    document.head.appendChild(el); return ()=>document.head.removeChild(el);
  },[]);

  // PHASE machine: "splash"|"intro"|"teach"|"michi-taunt"|"challenge"|"success"|"fail"|"death"|"victory"
  const [phase, setPhase]       = useState("splash");
  const [lvIdx, setLvIdx]       = useState(0);
  const [scriptLine, setScriptLine] = useState(0);
  const [lives, setLives]       = useState(3);
  const [score, setScore]       = useState(0);
  const [bombTime, setBombTime] = useState(5);
  const [doorOpen, setDoorOpen] = useState(false);
  const [fx, setFx]             = useState(null); // "red"|"green"|"shake"
  const [michiMood, setMichiMood] = useState("normal");
  const [michiAnim, setMichiAnim] = useState("slide-r");
  const [dugMood, setDugMood]   = useState("excited");
  const [dugAnim, setDugAnim]   = useState("slide-l");
  const [michiOn, setMichiOn]   = useState(false);
  const [dugOn, setDugOn]       = useState(false);
  const [resultMsg, setResultMsg] = useState("");
  const [confetti, setConfetti] = useState(false);
  const [explosion, setExplosion] = useState(false);
  const [introStep, setIntroStep] = useState(0);
  const [chatOpen, setChatOpen] = useState(false);
  const [chatMsgs, setChatMsgs] = useState([]);
  const [chatIn, setChatIn]     = useState("");
  const [chatLoad, setChatLoad] = useState(false);
  const chatRef = useRef(null);
  const shakeRef = useRef(null);

  const lv = LEVELS[lvIdx];
  const bgClass = phase==="victory"?"bg-victory":phase==="splash"||phase==="intro"?"bg-intro":lv.bg;

  useEffect(()=>{ chatRef.current?.scrollIntoView({behavior:"smooth"}); },[chatMsgs]);

  const triggerFx = (type, ms=700) => { setFx(type); setTimeout(()=>setFx(null), ms); };

  /* ── SPEAK ── */
  const say = (text, michi=false) => speak(text, michi);

  /* ── INTRO sequence ── */
  // steps 0=title 1=michi_enters 2=michi_bubble1 3=michi_places_bomb 4=michi_runs 5=dog_screams 6=dug_enters 7=dug_bubble 8=start_btn

  /* ── FIX: Auto-advance step 3 (bomb plant — no UI element existed) ── */
  useEffect(()=>{
    if (phase === "intro" && introStep === 3) {
      playBombPlant();
      const t = setTimeout(()=> setIntroStep(4), 2200);
      return ()=>clearTimeout(t);
    }
  }, [phase, introStep]);

  const INTRO_BUBBLES = [
    {who:"michi", text:"¡Por fin... el mundo será mi caja de arena GIGANTE! ¡MIAU-AJAJAJA! ¡Nadie puede detenerme!"},
    {who:"michi", text:"¡Con esta bomba química explotan todos los laboratorios del planeta! ¡BIP... BIP... BIP! ¡El tiempo corre, perritos!"},
    {who:"dug",   text:"¡No llores, cadete! ¡Yo soy Dug, el perro científico más fiel del universo! ¡Yo tengo las llaves pero TÚ debes usarlas!"},
    {who:"dug",   text:"Hay 5 Puertas Blindadas. Yo te enseño cada código... y luego tú lo abres. ¿Estás listo para salvar el mundo? ¡Yo creo en ti!"},
  ];

  const advIntro = useCallback(() => {
    setIntroStep(s => {
      const n = s + 1;
      if (n === 1) { setMichiOn(true); setMichiMood("normal"); setMichiAnim("slide-r"); playSFX.whoosh(); say("¡Miau ajajaja! ¡El mundo será mío!", true); }
      if (n === 3) { setMichiMood("laugh"); say("¡BIP BIP BIP! ¡La bomba está puesta! ¡MIAU AJAJAJA!", true); }
      if (n === 4) { setMichiMood("normal"); setMichiAnim("run-r"); playSFX.whoosh(); setTimeout(()=>setMichiOn(false), 1000); speak("¡Que explote todo! ¡MIAU!", true); }
      if (n === 6) { setDugOn(true); setDugMood("excited"); setDugAnim("slide-l"); playSFX.whoosh(); }
      if (n >= 9) { playSFX.missionStart(); setPhase("teach"); setScriptLine(0); setDugMood("excited"); setMichiOn(false); return 9; }
      return n;
    });
  }, []);

  /* ── TEACH ── */
  const advTeach = () => {
    const next = scriptLine + 1;
    if (next >= lv.dugLines.length) {
      setDugAnim("slide-out-l"); playSFX.whoosh();
      setTimeout(()=>{
        setDugOn(false);
        setMichiOn(true); setMichiMood("laugh"); setMichiAnim("slide-r");
        playSFX.whoosh();
        setPhase("michi-taunt");
      }, 500);
    } else {
      setScriptLine(next);
      setDugMood(lv.dugLines[next].mood);
      say(lv.dugLines[next].line);
    }
  };

  useEffect(()=>{
    if (phase==="teach") say(lv.dugLines[0].line);
  }, [phase, lvIdx]);

  const advMichiTaunt = () => {
    setMichiAnim("slide-out-r");
    setTimeout(()=>{ setMichiOn(false); setPhase("challenge"); }, 450);
  };

  /* ── CHALLENGE RESULT ── */
  const handleResult = (correct, fb) => {
    setResultMsg(fb);
    if (correct) {
      triggerFx("green", 900);
      playSFX.success(); playSFX.doorOpen();
      setDoorOpen(true);
      setScore(s => s + 100);
      setMichiOn(true); setMichiMood("shocked"); setMichiAnim("slide-r");
      playSFX.whoosh();
      speak(lv.michiShock, true);
      setConfetti(true); setTimeout(()=>setConfetti(false), 4500);
      setPhase("success");
    } else {
      triggerFx("shake", 700);
      triggerFx("red", 700);
      playSFX.fail(); playSFX.whoosh();
      const newLives = lives - 1;
      setLives(newLives);
      setBombTime(t => Math.max(t - 1, 1));
      setMichiOn(true); setMichiMood("laugh"); setMichiAnim("slide-r");
      speak("¡Miau ajajaja! ¡Fallaste!", true);
      if (newLives <= 0) {
        setExplosion(true); playSFX.explosion();
        setTimeout(()=>{ setExplosion(false); setPhase("death"); }, 1500);
      } else {
        setPhase("fail");
      }
    }
  };

  const nextLevel = () => {
    const next = lvIdx + 1;
    setMichiAnim("slide-out-r"); setMichiOn(false);
    setDoorOpen(false);
    if (next >= LEVELS.length) {
      setTimeout(()=>setPhase("victory"), 500);
    } else {
      setTimeout(()=>{
        setLvIdx(next); setScriptLine(0);
        setDugOn(true); setDugMood("excited"); setDugAnim("slide-l");
        setPhase("teach");
      }, 500);
    }
  };

  const retryChallenge = () => {
    setMichiAnim("slide-out-r");
    setTimeout(()=>{ setMichiOn(false); setPhase("challenge"); }, 400);
  };

  const resetGame = () => {
    setPhase("splash"); setLvIdx(0); setLives(3); setScore(0);
    setBombTime(5); setDoorOpen(false); setMichiOn(false); setDugOn(false);
    setIntroStep(0); setScriptLine(0);
  };

  /* ── BOMB TICK sound during challenge ── */
  useEffect(()=>{
    if (phase !== "challenge" && phase !== "fail") return;
    const interval = phase==="fail" ? 350 : 1100;
    const t = setInterval(()=>{ phase==="fail" ? playSFX.fastTick() : playSFX.tick(); }, interval);
    return ()=>clearInterval(t);
  },[phase]);

  /* ── CHAT ── */
  useEffect(()=>{ chatRef.current?.scrollIntoView({behavior:"smooth"}); },[chatMsgs]);
  const sendChat = async () => {
    if (!chatIn.trim() || chatLoad) return;
    const msg = chatIn.trim(); setChatIn("");
    setChatMsgs(p=>[...p,{role:"user",content:msg}]); setChatLoad(true);
    const sys = `Eres Dug, el Golden Retriever científico héroe. Hablas con entusiasmo perruno (¡guau!, ¡acabo de conocerte y ya te quiero!) pero con rigor científico total.
Estudiante en Nivel ${lvIdx+1}: "${lv.doorLabel}". Explica química de disoluciones acuosas con pasos claros y analogías con perros. Nunca menciones "PDF" o "archivo". Máximo 120 palabras.`;
    const history=[...chatMsgs,{role:"user",content:msg}].map(m=>({role:m.role,content:m.content}));
    let delay=1000;
    for(let i=0;i<4;i++){
      try{
        const r=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:history})
        });
        const d=await r.json();
        const rep=d.content?.map(b=>b.text||"").join("")||"¡Arf! Error. Intenta de nuevo.";
        setChatMsgs(p=>[...p,{role:"assistant",content:rep}]);
        speak(rep, false);
        break;
      }catch{
        if(i<3){await new Promise(res=>setTimeout(res,delay));delay*=2;}
        else setChatMsgs(p=>[...p,{role:"assistant",content:"¡Arf! El Michi saboteó mi señal. ¡Inténtalo otra vez!"}]);
      }
    }
    setChatLoad(false);
  };

  /* ════ RENDER ════ */
  return (
    <div className={`relative min-h-screen overflow-hidden ${bgClass} scanlines transition-colors duration-700`}
      style={{animation: fx==="shake"?"shake .55s ease":"none"}}>

      {/* Screen flashes */}
      {fx==="red" && <div className="fixed inset-0 pointer-events-none" style={{zIndex:200,animation:"redFlash .7s ease"}}/>}
      {fx==="green" && <div className="fixed inset-0 pointer-events-none" style={{zIndex:200,animation:"greenFlash .7s ease"}}/>}
      {confetti && <Confetti/>}
      {explosion && <Explosion/>}

      <Clouds/>
      <Skyline/>

      {/* ════ SPLASH ════ */}
      {phase==="splash" && (
        <div className="relative flex flex-col items-center justify-center min-h-screen px-4 pb-24" style={{zIndex:10}}>
          <div className="pop-in text-center">
            <div className="bangers text-6xl md:text-8xl neon-text text-cyan-400 leading-none">💣 QUÍMICA</div>
            <div className="bangers text-4xl md:text-6xl text-yellow-400 drop-shadow-2xl leading-none">BAJO AMENAZA</div>
            <div className="bangers text-2xl text-purple-300 mt-2">Perritos vs. General Michimalvado</div>
            <div className="mt-4 flex justify-center gap-12">
              <MichiSVG mood="normal" w={100}/>
              <DugSVG mood="excited" w={100}/>
            </div>
            <div className="mt-6 text-slate-300 text-sm max-w-xs mx-auto" style={{fontFamily:"Nunito,sans-serif"}}>
              5 puertas blindadas. 1 bomba. Solo la química puede salvar el mundo.
            </div>
            <button onClick={()=>{setPhase("intro");setIntroStep(0);}}
              className="btn-danger mt-8 px-10 py-5 rounded-2xl bangers text-3xl text-white w-full max-w-xs mx-auto block">
              🎬 ¡VER LA CINEMÁTICA!
            </button>
            <button onClick={()=>{setPhase("teach");setScriptLine(0);setDugOn(true);setDugMood("excited");setDugAnim("slide-l");}}
              className="mt-3 text-slate-400 text-sm underline" style={{fontFamily:"Nunito,sans-serif"}}>
              Saltar intro y jugar directamente ▶
            </button>
          </div>
        </div>
      )}

      {/* ════ INTRO CINEMATIC ════ */}
      {phase==="intro" && (
        <div className="relative flex flex-col items-center min-h-screen pt-6 pb-32 px-4" style={{zIndex:10}}>
          {/* Characters */}
          <div className="w-full max-w-lg relative flex items-end justify-between" style={{minHeight:220}}>
            {michiOn && (
              <div className={`absolute right-0 bottom-0 ${michiAnim}`}>
                <MichiSVG mood={michiMood} w={130} anim={michiMood==="laugh"?"wiggle":michiMood==="running"?"run-r":"float"}/>
              </div>
            )}
            {dugOn && (
              <div className={`absolute left-0 bottom-0 ${dugAnim}`}>
                <DugSVG mood={dugMood} w={130} anim="float"/>
              </div>
            )}
            {/* Bomb center */}
            {introStep>=3 && <div className="absolute left-1/2 -translate-x-1/2 bottom-4 pop-in"><Bomb time={bombTime}/></div>}
          </div>

          {/* Step 3: bomb plant - auto-advances via useEffect */}
          {introStep===3 && (
            <div className="mt-8 text-center pop-in">
              <div className="bangers text-4xl text-orange-400">💣 ¡LA BOMBA ESTÁ PLANTADA!</div>
              <div className="bangers text-2xl text-red-300 mt-2 wiggle">¡BIP... BIP... BIP!</div>
              <div className="text-slate-400 text-xs mt-4" style={{fontFamily:"Nunito,sans-serif"}}>preparando siguiente escena...</div>
            </div>
          )}

          {/* Intro step 0: title */}
          {introStep===0 && (
            <div className="mt-8 text-center pop-in">
              <div className="bangers text-5xl text-red-400">🎬 CINEMÁTICA DE APERTURA</div>

              <button onClick={advIntro} className="btn-danger mt-6 px-10 py-4 rounded-2xl bangers text-2xl text-white">▶ ¡INICIAR!</button>
            </div>
          )}

          {/* Speech bubbles */}
          {introStep===1 && (
            <div className="absolute right-4 top-4 z-30 max-w-xs">
              <Bubble speaker="😼 GENERAL MICHIMALVADO" text={INTRO_BUBBLES[0].text} side="right" color="#fce7f3" border="#ec4899" onDone={advIntro}/>
            </div>
          )}
          {introStep===2 && (
            <div className="absolute right-4 top-4 z-30 max-w-xs">
              <Bubble speaker="😼 MICHIMALVADO" text={INTRO_BUBBLES[1].text} side="right" color="#fce7f3" border="#ec4899" onDone={advIntro}/>
            </div>
          )}
          {introStep===4 && (
            <div className="mt-4 text-center pop-in">
              <div className="bangers text-3xl text-yellow-300">🐶🐶🐶 ¡GUAU! ¡SÁLVANOS! ¡EL MUNDO VA A EXPLOTAR! 🐶🐶🐶</div>
              <div className="text-5xl mt-2" style={{animation:"floatY 0.4s ease-in-out infinite"}}>😱😱😱</div>
              <button onClick={advIntro} className="btn-danger mt-4 px-8 py-3 rounded-xl bangers text-xl text-white">CONTINUAR ▶</button>
            </div>
          )}
          {introStep===5 && (
            <div className="mt-4 text-center pop-in">
              <div className="bangers text-2xl text-red-300">😹 LOS GATITOS SE RÍEN EN EL FONDO 😹</div>
              <div className="bangers text-lg text-purple-300">¡MIAU-AJAJAJA! ¡EL PLAN ES PERFECTO!</div>
              <button onClick={advIntro} className="btn-danger mt-4 px-8 py-3 rounded-xl bangers text-xl text-white">CONTINUAR ▶</button>
            </div>
          )}
          {introStep===6 && (
            <div className="absolute left-4 top-4 z-30 max-w-xs">
              <Bubble speaker="🐕 DUG — PERRO CIENTÍFICO" text={INTRO_BUBBLES[2].text} side="left" color="#fef9c3" border="#ca8a04" onDone={advIntro}/>
            </div>
          )}
          {introStep===7 && (
            <div className="absolute left-4 top-4 z-30 max-w-xs">
              <Bubble speaker="🐕 DUG" text={INTRO_BUBBLES[3].text} side="left" color="#fef9c3" border="#ca8a04" onDone={advIntro}/>
            </div>
          )}
          {introStep===8 && (
            <div className="mt-6 text-center pop-in">
              <div className="bangers text-3xl text-cyan-300 mb-4">¿Estás listo, cadete?</div>
              <button onClick={advIntro} className="btn-go px-12 py-5 rounded-2xl bangers text-3xl text-white w-full max-w-xs mx-auto block">
                🐾 ¡ACEPTAR MISIÓN!
              </button>
            </div>
          )}
        </div>
      )}

      {/* ════ GAME PHASES ════ */}
      {phase!=="splash" && phase!=="intro" && phase!=="victory" && phase!=="death" && (
        <div className="relative flex flex-col min-h-screen pb-32" style={{zIndex:10}}>
          {/* HUD */}
          <div className="flex items-center justify-between px-4 pt-4 pb-2 flex-wrap gap-2">
            <Hearts lives={lives}/>
            <div className="prog-bar w-28 md:w-40">
              <div className="prog-fill" style={{width:`${lvIdx/5*100}%`}}/>
            </div>
            <div className="bangers text-yellow-400 text-lg">⭐ {score}</div>
            <button onClick={()=>setChatOpen(o=>!o)}
              className="px-3 py-1.5 rounded-xl border-2 border-yellow-500 bg-yellow-900/50 text-yellow-300 bangers text-sm">
              🐾 Preguntar a Dug
            </button>
          </div>

          {/* Level info */}
          <div className="text-center px-4">
            <div className="bangers text-lg text-cyan-400">{lv.landscape}</div>
          </div>

          {/* Stage */}
          <div className="flex-1 flex flex-col items-center px-4 pt-2">
            {/* Door + Bomb */}
            <div className="flex items-end gap-8 md:gap-16 mb-4 justify-center">
              <Door color={lv.color} label={lv.doorLabel} open={doorOpen}/>
              <Bomb time={bombTime} fast={phase==="fail"}/>
            </div>

            {/* Characters */}
            <div className="w-full max-w-lg relative flex items-end justify-between" style={{minHeight:190}}>
              {dugOn && (
                <div className={`absolute left-0 bottom-0 ${dugAnim}`}>
                  <DugSVG mood={dugMood} w={120} anim={phase==="teach"?"float":"heartbeat-anim"}/>
                </div>
              )}
              {michiOn && (
                <div className={`absolute right-0 bottom-0 ${michiAnim}`}>
                  <MichiSVG mood={michiMood} w={120} anim={michiMood==="laugh"?"wiggle":michiMood==="shocked"?"heartbeat-anim":"float"}/>
                </div>
              )}
            </div>

            {/* ── TEACH ── */}
            {phase==="teach" && dugOn && (
              <div className="absolute left-4 top-48 md:top-40 z-30 max-w-xs pop-in">
                <Bubble key={scriptLine} speaker={`🐕 DUG — ${lv.dugLines[scriptLine].mood==="secret"?"¡SECRETO!":"LECCIÓN "+(scriptLine+1)+"/"+lv.dugLines.length}`}
                  text={lv.dugLines[scriptLine].line} side="left" color="#fef9c3" border="#ca8a04" onDone={advTeach}/>
              </div>
            )}

            {/* ── MICHI TAUNT ── */}
            {phase==="michi-taunt" && michiOn && (
              <div className="absolute right-4 top-44 z-30 max-w-xs pop-in">
                <Bubble speaker="😼 MICHIMALVADO" text={lv.michiTaunt} side="right" color="#fce7f3" border="#ec4899" onDone={advMichiTaunt}/>
              </div>
            )}

            {/* ── CHALLENGE ── */}
            {phase==="challenge" && (
              <div className="w-full max-w-md mt-2 flex flex-col items-center gap-4">
                <div className="w-full p-4 rounded-2xl comic bg-slate-950/90">
                  <div className="bangers text-yellow-400 text-base mb-2">🔐 DESCIFRA EL CÓDIGO:</div>
                  <p className="text-white text-sm leading-relaxed whitespace-pre-line mb-4" style={{fontFamily:"Nunito,sans-serif"}}>
                    <Sci t={lv.challenge.question}/>
                  </p>
                  {lv.challenge.type==="multi"    && <MultiChallenge    ch={lv.challenge} onResult={handleResult}/>}
                  {lv.challenge.type==="classify" && <ClassifyChallenge ch={lv.challenge} onResult={handleResult}/>}
                  {lv.challenge.type==="redox"    && <RedoxChallenge    ch={lv.challenge} onResult={handleResult}/>}
                  {lv.challenge.type==="numeric"  && <NumericChallenge  ch={lv.challenge} onResult={handleResult}/>}
                </div>
              </div>
            )}

            {/* ── SUCCESS ── */}
            {phase==="success" && (
              <>
                {michiOn && (
                  <div className="absolute right-4 top-44 z-30 max-w-xs pop-in">
                    <Bubble speaker="🙀 MICHIMALVADO (DERROTADO)" text={lv.michiShock} side="right" color="#fce7f3" border="#ec4899" auto onDone={()=>setMichiOn(false)}/>
                  </div>
                )}
                {!michiOn && (
                  <div className="w-full max-w-md flex flex-col items-center gap-4 mt-2 pop-in">
                    <div className="w-full p-5 rounded-2xl comic-green bg-green-950/90 text-center">
                      <div className="bangers text-4xl text-green-400">🐾 ¡PUERTA ABIERTA!</div>
                      <div className="text-5xl my-2 heartbeat-anim">🎉</div>
                      <p className="text-green-200 text-sm mb-3" style={{fontFamily:"Nunito,sans-serif"}}>{resultMsg}</p>
                      <div className="bangers text-3xl text-yellow-400 mb-3">+100 ⭐</div>
                      <button onClick={nextLevel}
                        className="btn-go px-8 py-4 rounded-2xl bangers text-2xl text-white w-full">
                        {lvIdx<LEVELS.length-1?"➡️ SIGUIENTE PUERTA":"🏆 ¡DESACTIVAR BOMBA!"}
                      </button>
                    </div>
                  </div>
                )}
              </>
            )}

            {/* ── FAIL ── */}
            {phase==="fail" && (
              <>
                {michiOn && (
                  <div className="absolute right-4 top-44 z-30 max-w-xs pop-in">
                    <Bubble speaker="😹 MICHI (RÍE)" text={`¡MIAU-AJAJAJA! ¡${resultMsg}! ¡La bomba hace BIP-BIP más rápido! Te quedan ${lives} ❤️`}
                      side="right" color="#fce7f3" border="#ec4899" auto onDone={()=>setMichiOn(false)}/>
                  </div>
                )}
                {!michiOn && (
                  <div className="w-full max-w-md mt-2 pop-in">
                    <div className="p-5 rounded-2xl comic-danger bg-red-950/90 text-center">
                      <div className="bangers text-3xl text-red-400">💥 RESPUESTA INCORRECTA</div>
                      <div className="text-5xl my-2 wiggle">😹</div>
                      <p className="text-red-200 text-sm mb-3" style={{fontFamily:"Nunito,sans-serif"}}>{resultMsg}</p>
                      <Hearts lives={lives}/>
                      <button onClick={retryChallenge}
                        className="btn-danger mt-4 px-8 py-4 rounded-2xl bangers text-2xl text-white w-full" style={{animation:"heartbeat 1s ease infinite"}}>
                        🔄 REINTENTAR
                      </button>
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      )}

      {/* ════ DEATH ════ */}
      {phase==="death" && (
        <div className="relative flex flex-col items-center justify-center min-h-screen px-4 pb-24 text-center" style={{zIndex:10}}>
          <div className="pop-in">
            <div className="text-8xl mb-4">💣💥🌋</div>
            <div className="bangers text-5xl text-red-400">¡LA BOMBA EXPLOTÓ!</div>
            <div className="bangers text-2xl text-orange-400 mt-2">¡El General Michimalvado GANÓ... por ahora</div>
            <div className="my-6 text-6xl wiggle">😼</div>
            <p className="text-slate-300 text-sm mb-6" style={{fontFamily:"Nunito,sans-serif"}}>
              "¡MIAU-AJAJAJA! ¡El mundo es mi caja de arena! ¡Los perritos fallaron!"
            </p>
            <button onClick={resetGame}
              className="btn-danger px-10 py-5 rounded-2xl bangers text-3xl text-white">
              🔄 INTENTAR DE NUEVO
            </button>
          </div>
        </div>
      )}

      {/* ════ VICTORY ════ */}
      {phase==="victory" && (
        <div className="relative flex flex-col items-center justify-center min-h-screen px-4 pb-24 text-center" style={{zIndex:10}}>
          <Confetti/>
          <div className="pop-in max-w-md w-full">
            <div className="bangers text-7xl neon-text text-yellow-400">¡VICTORIA!</div>
            <div className="text-5xl my-3">🐕🎉🏆🎉🐕</div>
            <div className="bangers text-2xl text-green-300">¡LA BOMBA FUE DESACTIVADA!</div>
            <div className="my-4">
              <DugSVG mood="excited" w={120} anim="heartbeat-anim"/>
            </div>
            <div className="p-5 rounded-2xl comic-gold bg-slate-900/90 mb-5">
              <div className="bangers text-4xl text-yellow-400">⭐ {score} PUNTOS ⭐</div>
              <p className="text-cyan-300 bangers text-lg mt-1">¡DUG: ¡SABÍA QUE PODÍAS! ¡TE QUIERO MUCHO!</p>
              <p className="text-purple-300 text-sm mt-2 italic" style={{fontFamily:"Nunito,sans-serif"}}>
                😼 Michimalvado: "¡ESTO NO TERMINÓ! ¡Los perritos estudiosos son mi peor pesadilla!"
              </p>
              <div className="mt-3 text-slate-400 text-xs" style={{fontFamily:"Nunito,sans-serif"}}>
                Dominaste: Electrolitos • Precipitación • Ácidos/Bases • Redox • Molaridad
              </div>
            </div>
            <button onClick={resetGame}
              className="btn-go px-10 py-5 rounded-2xl bangers text-3xl text-white w-full">
              🔄 ¡JUGAR DE NUEVO!
            </button>
          </div>
        </div>
      )}

      {/* ════ DUG CHAT ════ */}
      {chatOpen && (
        <div className="fixed bottom-4 right-2 md:right-4 z-50 w-[calc(100vw-1rem)] max-w-xs rounded-2xl border-4 border-yellow-500 bg-slate-900 shadow-2xl flex flex-col overflow-hidden"
          style={{height:400}}>
          <div className="flex items-center justify-between px-3 py-2 bg-yellow-900/60 border-b border-yellow-700">
            <div className="flex items-center gap-2">
              <DugSVG mood="normal" w={38}/>
              <div><p className="bangers text-yellow-400 text-sm">Dug — Tutor IA</p><p className="text-xs text-yellow-600">Nivel {lvIdx+1}</p></div>
            </div>
            <button onClick={()=>setChatOpen(false)} className="text-yellow-400 hover:text-white bangers text-xl">✕</button>
          </div>
          <div className="flex-1 overflow-y-auto p-3 space-y-2">
            {chatMsgs.length===0 && <div className="text-center p-4"><p className="text-slate-400 text-sm" style={{fontFamily:"Nunito,sans-serif"}}>¡Hola! ¡Acabo de conocerte y ya te quiero! Pregunta lo que necesites sobre {lv.doorLabel}.</p></div>}
            {chatMsgs.map((m,i)=>(
              <div key={i} className={`flex ${m.role==="user"?"justify-end":"justify-start"}`}>
                <div className={`max-w-[85%] px-3 py-2 rounded-xl text-sm ${m.role==="user"?"bg-violet-700 text-white rounded-br-none":"bg-slate-800 text-slate-200 rounded-bl-none border border-slate-700"}`}
                  style={{fontFamily:"Nunito,sans-serif"}}>
                  {m.role==="assistant" && <span className="mr-1">🐶</span>}{m.content}
                </div>
              </div>
            ))}
            {chatLoad && <div className="flex justify-start"><div className="px-3 py-2 rounded-xl bg-slate-800 border border-slate-700 text-slate-400 text-sm">🐶 olfateando la respuesta<span className="animate-pulse">...</span></div></div>}
            <div ref={chatRef}/>
          </div>
          <div className="p-2 border-t border-slate-800 flex gap-2">
            <input value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()}
              placeholder="Pregunta a Dug..." style={{fontFamily:"Nunito,sans-serif"}}
              className="flex-1 px-3 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white text-sm focus:outline-none focus:border-yellow-400 placeholder-slate-500"/>
            <button onClick={sendChat} disabled={chatLoad}
              className="px-3 py-2 rounded-xl bg-yellow-600 hover:bg-yellow-500 disabled:opacity-50 text-white bangers text-lg">➤</button>
          </div>
        </div>
      )}

      {/* Chat FAB */}
      {!chatOpen && phase!=="splash" && phase!=="intro" && (
        <button onClick={()=>setChatOpen(true)}
          className="fixed bottom-5 right-4 z-40 w-14 h-14 rounded-full border-4 border-yellow-500 bg-yellow-600 hover:bg-yellow-500 shadow-2xl text-2xl flex items-center justify-center float">
          🐾
        </button>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>
</body>
</html>
